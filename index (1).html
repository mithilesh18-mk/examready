<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#fff;color:#1e293b;}
input,select,textarea,button{font-family:inherit;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:#f1f5f9;}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}

/* SCIENCE BG */
.sci-bg{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
.sci-bg svg{position:absolute;opacity:0.07;}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.fade{animation:fadeUp 0.4s ease;}
.spinner{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.7s linear infinite;}

/* CARDS */
.card{background:#fff;border:1.5px solid #e2e8f0;border-radius:18px;box-shadow:0 4px 24px rgba(0,0,0,0.07);}
.card-blue{background:linear-gradient(135deg,#eff6ff,#f0f9ff);border:1.5px solid #bfdbfe;}
.card-green{background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border:1.5px solid #bbf7d0;}
.card-purple{background:linear-gradient(135deg,#faf5ff,#f5f3ff);border:1.5px solid #ddd6fe;}

/* INPUTS */
.inp{width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid #e2e8f0;background:#f8fafc;color:#1e293b;font-size:14px;outline:none;transition:border 0.2s;}
.inp:focus{border-color:#3b82f6;background:#fff;}
select.inp{cursor:pointer;}

/* BUTTONS */
.btn-primary{padding:11px 22px;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;font-size:14px;font-weight:700;font-family:inherit;transition:opacity 0.2s,transform 0.1s;}
.btn-primary:hover{opacity:0.92;transform:translateY(-1px);}
.btn-secondary{padding:10px 20px;border-radius:10px;border:1.5px solid #e2e8f0;cursor:pointer;background:#fff;color:#64748b;font-size:14px;font-weight:600;font-family:inherit;transition:all 0.2s;}
.btn-secondary:hover{border-color:#94a3b8;color:#374151;}
.btn-green{padding:11px 22px;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;font-size:14px;font-weight:700;font-family:inherit;}
.btn-red{padding:11px 22px;border-radius:10px;border:none;cursor:pointer;background:#dc2626;color:#fff;font-size:14px;font-weight:700;font-family:inherit;}
.btn-purple{padding:11px 22px;border-radius:10px;border:none;cursor:pointer;background:#7c3aed;color:#fff;font-size:14px;font-weight:700;font-family:inherit;}
.btn-orange{padding:11px 22px;border-radius:10px;border:none;cursor:pointer;background:#ea580c;color:#fff;font-size:14px;font-weight:700;font-family:inherit;}

/* LABEL */
.lbl{color:#64748b;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;display:block;margin-bottom:5px;}

/* TOP BAR */
.topbar{background:#fff;border-bottom:1.5px solid #e2e8f0;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.06);}

/* OPTION BUTTONS */
.opt-btn{background:#f8fafc;border:2px solid #e2e8f0;border-radius:12px;padding:13px 16px;cursor:pointer;color:#374151;font-size:15px;text-align:left;font-family:inherit;display:flex;align-items:center;gap:12px;width:100%;transition:all 0.15s;}
.opt-btn:hover{border-color:#93c5fd;background:#eff6ff;}
.opt-btn.selected{background:#eff6ff;border-color:#3b82f6;color:#1d4ed8;}
.opt-circle{width:30px;height:30px;border-radius:50%;flex-shrink:0;background:#e2e8f0;border:2px solid #cbd5e1;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#64748b;transition:all 0.15s;}
.opt-btn.selected .opt-circle{background:#3b82f6;border-color:#3b82f6;color:#fff;}
</style>
</head>

// SCIENCE BG
(function(){

function pad(n){return String(n).padStart(2,"0");}
function formatTime(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return h>0?`${pad(h)}:${pad(m)}:${pad(sec)}`:`${pad(m)}:${pad(sec)}`;}
function uid(){return Date.now()+Math.random();}
function makeCaptcha(){const a=Math.floor(Math.random()*9)+1,b=Math.floor(Math.random()*9)+1,p=Math.random()>0.5;return p?{q:`${a} + ${b} = ?`,ans:a+b}:{q:`${Math.max(a,b)} − ${Math.min(a,b)} = ?`,ans:Math.abs(a-b)};}
function el(id){return document.getElementById(id);}

let state={

  student:null,

  answers:{},

};

// FIREBASE
async function loadQuestions(){
  try{const s=await getDocs(query(collection(db,"questions"),orderBy("createdAt","asc")));state.questions=s.docs.map(d=>({id:d.id,...d.data()}));}catch(e){console.error(e);}
}
async function saveQuestion(data){
  try{const r=await addDoc(collection(db,"questions"),{...data,createdAt:serverTimestamp()});state.questions.push({id:r.id,...data});return true;}catch(e){return false;}
}
async function updateQuestion(id,data){
  try{await updateDoc(doc(db,"questions",id),data);state.questions=state.questions.map(q=>q.id===id?{...q,...data}:q);return true;}catch(e){return false;}
}
async function deleteQuestion(id){
  try{await deleteDoc(doc(db,"questions",id));state.questions=state.questions.filter(q=>q.id!==id);return true;}catch(e){return false;}
}
async function saveResult(data){
  try{await addDoc(collection(db,"results"),{...data,submittedAt:serverTimestamp()});}catch(e){}
}
async function loadAllResults(){
  try{const s=await getDocs(query(collection(db,"results"),orderBy("score","desc")));
  const results=s.docs.map(d=>({id:d.id,...d.data()}));
  // Rank by score desc, timeTaken asc
  results.sort((a,b)=>b.score-a.score||(a.timeTaken||0)-(b.timeTaken||0));
  state.allResults=results.map((r,i)=>({...r,rank:i+1}));
  return state.allResults;}catch(e){return[];}
}

// AI SOLUTION
async function generateAISolution(question,options,correct){
  try{
    const prompt=`You are an expert teacher for competitive exams (Junior Engineer/Supervisor level). 
Question: ${question}
Options: A) ${options[0]}  B) ${options[1]}  C) ${options[2]}  D) ${options[3]}
Correct Answer: ${String.fromCharCode(65+correct)}) ${options[correct]}

Provide a clear, concise explanation (3-5 lines) of why this is correct. Include relevant formula or concept if applicable. Be direct and educational.`;
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,messages:[{role:"user",content:prompt}]})
    });
    const data=await res.json();
    return data.content?.[0]?.text||"Solution not available.";
  }catch(e){return"Solution not available.";}
}

// RENDER
function render(){
  const root=el("root");root.innerHTML="";
  if(state.showAdminLogin)root.appendChild(renderAdminModal());
  let s;
  if(state.screen==="landing")s=renderLanding();
  else if(state.screen==="signin")s=renderSignIn();
  else if(state.screen==="instructions")s=renderInstructions();
  else if(state.screen==="exam")s=renderExam();
  else if(state.screen==="result")s=renderResult();
  else if(state.screen==="solutions")s=renderSolutions();
  else if(state.screen==="admin")s=renderAdmin();
  else s=renderLanding();
  root.appendChild(s);
}

  const d=document.createElement("div");

function handleLogoClick(){
  state.logoClickCount++;

  if(state.logoClickCount>=10){state.logoClickCount=0;state.showAdminLogin=true;render();return;}

// 2. SIGN IN
function renderSignIn(){
  const d=document.createElement("div");
  d.style.cssText="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;z-index:1;";
  d.innerHTML=`
    <div class="card fade" style="padding:44px 38px;max-width:460px;width:100%;">
      <div style="text-align:center;margin-bottom:30px;">

      </div>

  `;
  d.querySelector("#capRefresh").onclick=()=>{state.captcha=makeCaptcha();d.querySelector("#capQ").textContent=state.captcha.q;d.querySelector("#capAns").value="";};

// 3. INSTRUCTIONS
function renderInstructions(){
  const d=document.createElement("div");
  d.style.cssText="min-height:100vh;background:#fff;display:flex;flex-direction:column;position:relative;z-index:1;";
  d.innerHTML=`
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#2563eb,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:15px;">📋</div>

    </div>
    <div style="flex:1;max-width:700px;margin:0 auto;width:100%;padding:32px 20px;overflow-y:auto;">
      <h2 style="color:#1e293b;font-size:22px;font-weight:900;margin-bottom:4px;font-family:'Crimson Pro',serif;">Exam Instructions</h2>
      <p style="color:#94a3b8;font-size:13px;margin-bottom:24px;">Please read all instructions carefully before starting the exam.</p>
      <div id="instrList"></div>
      <div id="instrLoader" style="display:flex;align-items:center;gap:8px;margin-top:16px;color:#3b82f6;">
        <div style="width:6px;height:6px;border-radius:50%;background:#3b82f6;animation:pulse 1s infinite;"></div>

      </div>
      <div id="instrDone" style="display:none;margin-top:28px;padding:24px;background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border:1.5px solid #bbf7d0;border-radius:14px;text-align:center;" class="fade">

        <p style="color:#15803d;font-weight:700;font-size:15px;margin-bottom:4px;">You have read all instructions.</p>
        <p style="color:#64748b;font-size:13px;margin-bottom:18px;">By clicking below, you confirm that you understand all the rules.</p>
        <button id="startBtn" class="btn-green" style="padding:13px 36px;font-size:15px;">I Understand — Start Exam →</button>
      </div>
      <div id="instrBottom"></div>
    </div>
  `;
  state.instrRevealed=0;clearInterval(state.instrTimer);
  function next(){
    if(state.instrRevealed>=INSTRUCTIONS.length){
      clearInterval(state.instrTimer);
      const ld=d.querySelector("#instrLoader"),dn=d.querySelector("#instrDone");
      if(ld)ld.style.display="none";if(dn)dn.style.display="block";return;
    }
    const item=INSTRUCTIONS[state.instrRevealed],list=d.querySelector("#instrList");
    if(!list)return;
    const row=document.createElement("div");
    if(item.type==="heading"){
      row.style.cssText="padding:8px 0;animation:fadeUp 0.5s ease;";
      row.innerHTML=`<div style="color:#1e293b;font-size:17px;font-weight:800;font-family:'Crimson Pro',serif;padding:10px 16px;background:linear-gradient(135deg,#eff6ff,#faf5ff);border-radius:10px;border-left:4px solid #2563eb;">${item.text}</div>`;
    } else if(item.type==="symbols"){
      row.style.cssText="padding:6px 0;animation:fadeUp 0.5s ease;";
      row.innerHTML=`
        <div style="display:flex;align-items:flex-start;gap:10px;">
          <div style="width:22px;height:22px;border-radius:50%;background:#e2e8f0;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#64748b;margin-top:2px;">${state.instrRevealed}</div>

            <div style="display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;">

              <span style="display:flex;align-items:center;gap:6px;background:#fef2f2;border:1px solid #fecaca;padding:5px 12px;border-radius:20px;font-size:13px;font-weight:600;color:#dc2626;">🔴 Not Attempted</span>
              <span style="display:flex;align-items:center;gap:6px;background:#faf5ff;border:1px solid #ddd6fe;padding:5px 12px;border-radius:20px;font-size:13px;font-weight:600;color:#7c3aed;">🟣 Marked for Review</span>
            </div>
          </div>
        </div>`;
    } else {
      row.style.cssText="padding:5px 0;animation:fadeUp 0.5s ease;";
      row.innerHTML=`
        <div style="display:flex;align-items:flex-start;gap:10px;">
          <div style="width:22px;height:22px;border-radius:50%;background:#eff6ff;border:1.5px solid #bfdbfe;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#2563eb;margin-top:1px;">${state.instrRevealed}</div>

        </div>`;
    }
    list.appendChild(row);
    d.querySelector("#instrBottom").scrollIntoView({behavior:"smooth"});
    state.instrRevealed++;
  }
  setTimeout(()=>{state.instrTimer=setInterval(next,800);},200);
  d.addEventListener("click",e=>{if(e.target.id==="startBtn")startExam();});
  return d;
}

function startExam(){
  clearInterval(state.instrTimer);
  state.answers={};state.statuses={};
  state.questions.forEach(q=>state.statuses[q.id]="unattempted");
  state.timeLeft=7200;state.startTime=Date.now();state.currentIdx=0;state.showConfirm=false;
  goTo("exam");startTimer();
}

function startTimer(){
  clearInterval(state.timerInterval);
  state.timerInterval=setInterval(()=>{
    state.timeLeft--;
    const te=el("examTimer");
    if(te){
      te.textContent="⏱ "+formatTime(state.timeLeft);
      const tc=state.timeLeft<300?"#ef4444":state.timeLeft<600?"#ea580c":"#16a34a";
      te.style.color=tc;te.parentElement.style.borderColor=tc+"44";te.parentElement.style.background=tc+"0f";
    }
    const c=getCounts();
    ["attempted","unattempted","review"].forEach(k=>{const ce=el("cnt_"+k);if(ce)ce.textContent=c[k];});
    if(state.timeLeft<=0){clearInterval(state.timerInterval);submitExam();}
  },1000);
}
function getCounts(){const v=Object.values(state.statuses);return{attempted:v.filter(s=>s==="attempted").length,unattempted:v.filter(s=>s==="unattempted").length,review:v.filter(s=>s==="review").length};}

// 4. EXAM

async function submitExam(){
  clearInterval(state.timerInterval);state.showConfirm=false;
  state.timeTaken=Math.floor((Date.now()-state.startTime)/1000);
  let c=0,w=0,u=0;
  state.questions.forEach(q=>{const s=state.statuses[q.id];if(s==="unattempted")u++;else if(state.answers[q.id]===q.correct)c++;else w++;});
  state.correct=c;state.incorrect=w;state.unattempted=u;state.score=c-w*0.25;
  const accuracy=c+w>0?((c/(c+w))*100).toFixed(1):0;
  await saveResult({name:state.student.name,email:state.student.email,course:state.student.course,score:state.score,correct:c,incorrect:w,unattempted:u,timeTaken:state.timeTaken,totalQs:state.questions.length,accuracy});
  await loadAllResults();
  goTo("result");
}

        <button id="viewSolBtn" class="btn-primary" style="flex:1;padding:13px;font-size:15px;">📖 View Solutions</button>
        <button id="retryBtn" class="btn-secondary" style="flex:1;padding:13px;font-size:15px;">🔄 Try Again</button>
      </div>
    </div>
  `;
  d.querySelector("#toggleLB").onclick=()=>{state.showLeaderboard=!state.showLeaderboard;render();};
  d.querySelector("#viewSolBtn").onclick=()=>goTo("solutions");
  d.querySelector("#retryBtn").onclick=()=>goTo("landing");

}

// 6. SOLUTIONS PAGE

        <div><div style="color:#1e293b;font-weight:800;font-size:14px;">Solutions</div><div style="color:#94a3b8;font-size:11px;">${state.student.name} · Score: ${state.score.toFixed(2)}</div></div>

async function loadSolutions(parentDiv){
  const list=parentDiv.querySelector("#solList");
  if(!list)return;
  // Reload questions with solutions from Firebase
  await loadQuestions();
  let html=`<h2 style="color:#1e293b;font-size:20px;font-weight:900;margin-bottom:4px;font-family:'Crimson Pro',serif;">Detailed Solutions</h2>
  <p style="color:#94a3b8;font-size:13px;margin-bottom:20px;">Review each question with AI-generated explanations.</p>`;

  for(let i=0;i<state.questions.length;i++){
    const q=state.questions[i];
    const s=state.statuses[q.id];
    const myAns=state.answers[q.id];
    const ok=myAns===q.correct;
    const borderCol=s==="unattempted"?"#e2e8f0":ok?"#bbf7d0":"#fecaca";
    const bgCol=s==="unattempted"?"#f8fafc":ok?"#f0fdf4":"#fef2f2";
    const badge=s==="unattempted"?`<span style="background:#f1f5f9;color:#64748b;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;">Not Attempted</span>`:ok?`<span style="background:#f0fdf4;color:#16a34a;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;">✅ Correct</span>`:`<span style="background:#fef2f2;color:#dc2626;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;">❌ Incorrect</span>`;

    html+=`<div style="background:${bgCol};border:1.5px solid ${borderCol};border-radius:14px;padding:18px;margin-bottom:12px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;">
        <span style="background:${q.part===1?"#eff6ff":"#faf5ff"};color:${q.part===1?"#2563eb":"#7c3aed"};border:1.5px solid ${q.part===1?"#bfdbfe":"#ddd6fe"};border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;">${q.part===1?"PART I":"PART II"}</span>
        <span style="color:#64748b;font-size:12px;">Q${i+1}</span>
        ${badge}
      </div>
      <p style="color:#1e293b;font-size:15px;line-height:1.6;margin:0 0 12px;font-weight:600;">${q.question}</p>
      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px;">
        ${q.options.map((opt,idx)=>{
          const isCorrect=idx===q.correct,isMyAns=myAns===idx&&s!=="unattempted";
          let bg="#fff",border="#e2e8f0",col="#374151",suffix="";
          if(isCorrect){bg="#f0fdf4";border="#86efac";col="#15803d";suffix=' <b style="color:#16a34a;">(Correct Answer)</b>';}
          if(isMyAns&&!isCorrect){bg="#fef2f2";border="#fca5a5";col="#dc2626";suffix=' <b style="color:#dc2626;">(Your Answer)</b>';}
          return `<div style="background:${bg};border:1.5px solid ${border};border-radius:8px;padding:9px 14px;font-size:13px;color:${col};">${String.fromCharCode(65+idx)}. ${opt}${suffix}</div>`;
        }).join("")}
      </div>
      <div style="background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;padding:14px;" id="sol_${q.id}">
        ${q.solution?`<div style="display:flex;gap:8px;align-items:flex-start;"><span style="font-size:16px;flex-shrink:0;">💡</span><div><div style="color:#1e293b;font-size:13px;font-weight:700;margin-bottom:4px;">Explanation</div><p style="color:#374151;font-size:13px;line-height:1.6;margin:0;">${q.solution}</p></div></div>`
        :`<div style="display:flex;gap:8px;align-items:center;" id="solLoad_${q.id}">
          <div class="spinner" style="width:20px;height:20px;border-width:2px;"></div>
          <span style="color:#94a3b8;font-size:13px;">Generating AI solution...</span>
        </div>`}
      </div>
    </div>`;
  }
  list.innerHTML=html;

  // Generate AI solutions for questions without solutions
  for(const q of state.questions){
    if(!q.solution){
      const sol=await generateAISolution(q.question,q.options,q.correct);
      // Save to Firebase
      await updateQuestion(q.id,{solution:sol});
      // Update UI
      const solEl=parentDiv.querySelector(`#sol_${q.id}`);
      if(solEl){
        solEl.innerHTML=`<div style="display:flex;gap:8px;align-items:flex-start;"><span style="font-size:16px;flex-shrink:0;">💡</span><div><div style="color:#1e293b;font-size:13px;font-weight:700;margin-bottom:4px;">Explanation</div><p style="color:#374151;font-size:13px;line-height:1.6;margin:0;">${sol}</p></div></div>`;
      }
    }
  }
}

            </div>
          </div>
          <div style="margin-bottom:14px;">

            <textarea id="formQ" rows="3" placeholder="Type question here..." class="inp" style="resize:vertical;line-height:1.5;">${state.adminForm.question}</textarea>
          </div>
          <div style="margin-bottom:14px;">
            <label class="lbl">Options * — <span style="color:#94a3b8;text-transform:none;letter-spacing:0;font-weight:400;">Click circle to mark correct answer</span></label>
            ${state.adminForm.options.map((opt,idx)=>`
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
                <button class="correctBtn" data-idx="${idx}" style="width:34px;height:34px;border-radius:50%;border:2px solid ${state.adminForm.correct===idx?"#16a34a":"#e2e8f0"};cursor:pointer;flex-shrink:0;background:${state.adminForm.correct===idx?"#16a34a":"#fff"};color:${state.adminForm.correct===idx?"#fff":"#94a3b8"};font-weight:800;font-size:15px;">${state.adminForm.correct===idx?"✓":String.fromCharCode(65+idx)}</button>
                <input class="optInp" data-idx="${idx}" value="${opt}" placeholder="Option ${String.fromCharCode(65+idx)}" class="inp" style="width:100%;padding:10px 13px;border-radius:9px;border:1.5px solid #e2e8f0;background:#f8fafc;color:#1e293b;font-size:14px;outline:none;font-family:inherit;"/>
              </div>`).join("")}
            <p style="color:#94a3b8;font-size:12px;margin-top:4px;">Correct answer: <b style="color:#16a34a;">Option ${String.fromCharCode(65+state.adminForm.correct)}</b></p>
          </div>
          <p id="adminErr" style="color:#ef4444;font-size:13px;margin-bottom:12px;display:${state.adminErr?"block":"none"};">${state.adminErr}</p>
          <div style="display:flex;gap:10px;">
            <button id="saveQBtn" class="btn-green" style="padding:10px 24px;">${state.adminEditId?"💾 Update":"➕ Add Question"}</button>
            ${state.adminEditId?`<button id="cancelEdit" class="btn-secondary">Cancel</button>`:""}
          </div>
        </div>
      </div>

      <!-- LIST -->
      <div style="display:${state.adminTab==="list"?"block":"none"};">
        <div style="display:flex;gap:6px;margin-bottom:14px;">
          ${[[0,"All"],[1,"Part I"],[2,"Part II"]].map(([p,l])=>`<button class="filterBtn" data-fp="${p}" style="padding:6px 14px;border-radius:7px;border:1.5px solid ${state.adminFilter===p?"#2563eb":"#e2e8f0"};cursor:pointer;font-size:12px;font-weight:600;background:${state.adminFilter===p?"#eff6ff":"#fff"};color:${state.adminFilter===p?"#2563eb":"#64748b"};">${l} (${p===0?state.questions.length:p===1?p1c:p2c})</button>`).join("")}
        </div>
        ${filtered.length===0?`<div style="text-align:center;padding:50px;color:#94a3b8;"><div style="font-size:32px;margin-bottom:8px;">📭</div>No questions yet.</div>`
        :`<div style="display:flex;flex-direction:column;gap:10px;">
          ${filtered.map((q,i)=>`
            <div class="card" style="padding:16px;">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">
                <div style="flex:1;">
                  <div style="display:flex;gap:6px;margin-bottom:6px;">
                    <span style="background:${q.part===1?"#eff6ff":"#faf5ff"};color:${q.part===1?"#2563eb":"#7c3aed"};border:1.5px solid ${q.part===1?"#bfdbfe":"#ddd6fe"};border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;">Part ${q.part}</span>
                    <span style="color:#94a3b8;font-size:12px;">Q${i+1}</span>
                    ${q.solution?`<span style="background:#f0fdf4;color:#16a34a;border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;">💡 Has Solution</span>`:`<span style="background:#fef9c3;color:#ca8a04;border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;">⏳ No Solution</span>`}
                  </div>
                  <p style="color:#1e293b;font-size:14px;margin:0 0 8px;line-height:1.5;">${q.question}</p>
                  <div style="display:flex;flex-wrap:wrap;gap:5px;">
                    ${q.options.map((opt,idx)=>`<span style="background:${idx===q.correct?"#f0fdf4":"#f8fafc"};border:1.5px solid ${idx===q.correct?"#86efac":"#e2e8f0"};color:${idx===q.correct?"#15803d":"#64748b"};border-radius:6px;padding:3px 10px;font-size:12px;">${String.fromCharCode(65+idx)}. ${opt}${idx===q.correct?" ✓":""}</span>`).join("")}
                  </div>
                </div>
                <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;">
                  <button class="editQBtn" data-id="${q.id}" class="btn-primary" style="padding:6px 12px;border-radius:8px;border:none;cursor:pointer;background:#2563eb;color:#fff;font-size:12px;font-weight:700;">✏ Edit</button>
                  <button class="delQBtn" data-id="${q.id}" class="btn-red" style="padding:6px 12px;border-radius:8px;border:none;cursor:pointer;background:#dc2626;color:#fff;font-size:12px;font-weight:700;">🗑 Del</button>
                </div>
              </div>
            </div>`).join("")}
        </div>`}
      </div>

      <!-- BULK -->
      <div style="display:${state.adminTab==="bulk"?"block":"none"};">
        <div class="card" style="padding:24px;">
          <h3 style="color:#1e293b;font-size:16px;font-weight:800;margin-bottom:8px;">📄 Add Multiple Questions</h3>
          <div style="background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:10px;padding:14px;margin-bottom:16px;font-size:12px;color:#1d4ed8;line-height:2;">
            <b>Format — blank line between each question:</b><br/>
            Q. Question text here<br/>A. Option A<br/>B. Option B<br/>C. Option C<br/>D. Option D<br/>ANS: A<br/>PART: 1
          </div>
          <textarea id="bulkArea" rows="12" placeholder="Paste questions here..." class="inp" style="resize:vertical;line-height:1.6;font-size:13px;margin-bottom:12px;">${state.adminBulk}</textarea>
          <p id="bulkMsg" style="color:#16a34a;font-size:13px;margin-bottom:12px;display:${state.adminBulkMsg?"block":"none"};">${state.adminBulkMsg}</p>
          <button id="bulkAddBtn" class="btn-green" style="padding:10px 24px;">➕ Parse & Add All</button>
        </div>
      </div>

      <!-- RESULTS -->
      <div style="display:${state.adminTab==="results"?"block":"none"};" id="adminResultsTab">
        <div id="adminResultsContent" style="text-align:center;padding:40px;">
          <div class="spinner" style="margin:0 auto 16px;"></div>
          <p style="color:#94a3b8;">Loading results...</p>
        </div>
      </div>
    </div>
  `;

  // Tabs
  d.querySelectorAll(".adminTab").forEach(b=>b.onclick=()=>{state.adminTab=b.dataset.tab;render();if(b.dataset.tab==="results")setTimeout(()=>loadAdminResults(d),100);});

  // Part selector
  d.querySelectorAll(".partBtn").forEach(b=>b.onclick=()=>{state.adminForm.part=parseInt(b.dataset.p);render();});
  d.querySelectorAll(".correctBtn").forEach(b=>b.onclick=()=>{state.adminForm.correct=parseInt(b.dataset.idx);render();});
  d.querySelectorAll(".optInp").forEach(inp=>inp.oninput=e=>{state.adminForm.options[parseInt(inp.dataset.idx)]=e.target.value;});
  const fq=d.querySelector("#formQ");if(fq)fq.oninput=e=>state.adminForm.question=e.target.value;

  // Save
  const saveBtn=d.querySelector("#saveQBtn");
  if(saveBtn)saveBtn.onclick=async()=>{
    state.adminForm.question=d.querySelector("#formQ")?.value||"";
    d.querySelectorAll(".optInp").forEach(i=>{state.adminForm.options[parseInt(i.dataset.idx)]=i.value;});
    if(!state.adminForm.question.trim()){state.adminErr="Question is empty.";render();return;}
    for(let i=0;i<4;i++)if(!state.adminForm.options[i].trim()){state.adminErr=`Option ${String.fromCharCode(65+i)} is empty.`;render();return;}
    state.adminErr="";saveBtn.textContent="Saving...";saveBtn.disabled=true;
    if(state.adminEditId){await updateQuestion(state.adminEditId,{...state.adminForm});state.adminEditId=null;}
    else await saveQuestion({...state.adminForm});
    state.adminForm={question:"",options:["","","",""],correct:0,part:1,solution:""};state.adminTab="list";render();
  };
  const ce=d.querySelector("#cancelEdit");if(ce)ce.onclick=()=>{state.adminEditId=null;state.adminForm={question:"",options:["","","",""],correct:0,part:1,solution:""};render();};

  // Filter
  d.querySelectorAll(".filterBtn").forEach(b=>b.onclick=()=>{state.adminFilter=parseInt(b.dataset.fp);render();});

  // Edit/Delete
  d.querySelectorAll(".editQBtn").forEach(b=>b.onclick=()=>{const q=state.questions.find(x=>x.id===b.dataset.id);if(q){state.adminEditId=q.id;state.adminForm={question:q.question,options:[...q.options],correct:q.correct,part:q.part,solution:q.solution||""};state.adminTab="add";render();}});
  d.querySelectorAll(".delQBtn").forEach(b=>b.onclick=async()=>{b.textContent="...";b.disabled=true;await deleteQuestion(b.dataset.id);render();});

  // Bulk
  const ba=d.querySelector("#bulkArea");if(ba)ba.oninput=e=>state.adminBulk=e.target.value;
  const bb=d.querySelector("#bulkAddBtn");
  if(bb)bb.onclick=async()=>{
    const text=d.querySelector("#bulkArea").value;
    const blocks=text.trim().split(/\n\s*\n/);
    let added=0,failed=0;bb.textContent="Adding...";bb.disabled=true;
    for(const block of blocks){
      const lines=block.trim().split("\n").map(l=>l.trim()).filter(Boolean);
      try{
        const qL=lines.find(l=>/^Q[.:]/i.test(l)),aL=lines.find(l=>/^A[.:]/i.test(l)),bL=lines.find(l=>/^B[.:]/i.test(l)),cL=lines.find(l=>/^C[.:]/i.test(l)),dL=lines.find(l=>/^D[.:]/i.test(l)),ansL=lines.find(l=>/^ANS/i.test(l)),partL=lines.find(l=>/^PART/i.test(l));
        if(!qL||!aL||!bL||!cL||!dL||!ansL){failed++;continue;}
        const qText=qL.replace(/^Q[.:]\s*/i,""),opts=[aL,bL,cL,dL].map(l=>l.replace(/^[A-D][.:]\s*/i,"")),ac=ansL.replace(/^ANS[.:]\s*/i,"").trim().toUpperCase(),correct=["A","B","C","D"].indexOf(ac),part=partL?parseInt(partL.replace(/^PART[.:]\s*/i,"")):1;
        if(correct===-1){failed++;continue;}
        await saveQuestion({question:qText,options:opts,correct,part:part===2?2:1,solution:""});added++;
      }catch{failed++;}
    }
    state.adminBulkMsg=`${added} added.${failed>0?` ${failed} skipped.`:""}`;state.adminBulk="";state.adminTab="list";render();
  };

  d.querySelector("#adminExit").onclick=()=>goTo("landing");
  if(state.adminTab==="results")setTimeout(()=>loadAdminResults(d),100);
  return d;
}

async function loadAdminResults(parentDiv){
  const content=parentDiv.querySelector("#adminResultsContent");if(!content)return;
  const results=await loadAllResults();
  if(results.length===0){content.innerHTML=`<div style="font-size:32px;margin-bottom:8px;">📭</div><p style="color:#94a3b8;">No results yet.</p>`;return;}
  content.innerHTML=`
    <div style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;font-size:13px;background:#fff;border-radius:12px;overflow:hidden;border:1.5px solid #e2e8f0;">
        <thead><tr style="background:#f8fafc;">
          ${["Rank","Name","Email","Course","Score","Correct","Wrong","Skip","Accuracy","Time"].map(h=>`<th style="padding:10px 12px;text-align:left;color:#64748b;font-weight:700;border-bottom:1.5px solid #e2e8f0;white-space:nowrap;">${h}</th>`).join("")}
        </tr></thead>
        <tbody>
          ${results.map((r,i)=>`<tr style="border-bottom:1px solid #f1f5f9;${i%2===0?"background:#fff;":"background:#fafafa;"}">
            <td style="padding:10px 12px;"><span style="width:26px;height:26px;border-radius:50%;background:${i===0?"#fbbf24":i===1?"#94a3b8":i===2?"#ea580c":"#e2e8f0"};display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:${i<3?"#fff":"#64748b"};">${r.rank}</span></td>
            <td style="padding:10px 12px;color:#1e293b;font-weight:600;">${r.name}</td>
            <td style="padding:10px 12px;color:#64748b;">${r.email}</td>
            <td style="padding:10px 12px;color:#64748b;">${r.course}</td>
            <td style="padding:10px 12px;color:#2563eb;font-weight:700;">${parseFloat(r.score).toFixed(2)}</td>
            <td style="padding:10px 12px;color:#16a34a;">${r.correct}</td>
            <td style="padding:10px 12px;color:#ef4444;">${r.incorrect}</td>
            <td style="padding:10px 12px;color:#94a3b8;">${r.unattempted}</td>
            <td style="padding:10px 12px;color:#ea580c;">${r.accuracy}%</td>
            <td style="padding:10px 12px;color:#64748b;">${formatTime(r.timeTaken)}</td>
          </tr>`).join("")}
        </tbody>
      </table>
    </div>`;
}

async function goTo(screen){
  clearInterval(state.timerInterval);clearInterval(state.instrTimer);
  if(screen==="admin"){state.loading=true;render();await loadQuestions();state.loading=false;state.adminTab="add";state.adminFilter=0;state.adminEditId=null;state.adminForm={question:"",options:["","","",""],correct:0,part:1,solution:""};state.adminBulk="";state.adminBulkMsg="";state.adminErr="";}
  if(screen==="signin"){state.loading=true;render();await loadQuestions();state.loading=false;}
  if(screen==="result")state.showLeaderboard=false;
  state.screen=screen;render();
}

render();
</script>
