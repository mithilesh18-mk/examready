// ── HELPERS ───────────────────────────────────────────────────────────────────
function pad(n){ return String(n).padStart(2,"0"); }
function formatTime(s){
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  return h>0?`${pad(h)}:${pad(m)}:${pad(sec)}`:`${pad(m)}:${pad(sec)}`;
}
function makeCaptcha(){
  const a=Math.floor(Math.random()*9)+1, b=Math.floor(Math.random()*9)+1;
  const plus=Math.random()>0.5;
  return plus
    ? {q:`${a} + ${b} = ?`, ans:a+b}
    : {q:`${Math.max(a,b)} - ${Math.min(a,b)} = ?`, ans:Math.abs(a-b)};
}
function el(id){ return document.getElementById(id); }
function qs(sel,parent){ return (parent||document).querySelector(sel); }

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = {
  screen: "landing",      // landing | signin | instructions | exam | result | admin
  student: null,
  questions: [],
  answers: {},
  statuses: {},
  timeLeft: 7200,
  startTime: null,
  timeTaken: 0,
  timerInterval: null,
  correct: 0, incorrect: 0, unattempted: 0, score: 0,
  currentIdx: 0,
  showConfirm: false,
  showAdminLogin: false,
  logoClickCount: 0,
  logoClickTimer: null,
  captcha: makeCaptcha(),
  instructionRevealed: 0,
  instructionTimer: null,
  adminTab: "add",
  adminFilter: 0,
  adminEditId: null,
  adminForm: { question:"", options:["","","",""], correct:0, part:1 },
  adminBulk: "",
  adminBulkMsg: "",
  adminErr: "",
  loading: false,
};

// ── FIREBASE FUNCTIONS ────────────────────────────────────────────────────────
async function loadQuestions(){
  try {
    const snap = await getDocs(query(collection(db,"questions"), orderBy("createdAt","asc")));
    state.questions = snap.docs.map(d=>({id:d.id,...d.data()}));
  } catch(e){ console.error("Load questions error:",e); }
}

async function saveQuestion(data){
  try {
    const ref = await addDoc(collection(db,"questions"),{...data, createdAt: serverTimestamp()});
    state.questions.push({id:ref.id,...data});
    return true;
  } catch(e){ console.error("Save error:",e); return false; }
}

async function updateQuestion(id, data){
  try {
    await updateDoc(doc(db,"questions",id), data);
    state.questions = state.questions.map(q=>q.id===id?{...q,...data}:q);
    return true;
  } catch(e){ console.error("Update error:",e); return false; }
}

async function deleteQuestion(id){
  try {
    await deleteDoc(doc(db,"questions",id));
    state.questions = state.questions.filter(q=>q.id!==id);
    return true;
  } catch(e){ console.error("Delete error:",e); return false; }
}

async function saveResult(data){
  try {
    await addDoc(collection(db,"results"),{...data, submittedAt: serverTimestamp()});
  } catch(e){ console.error("Result save error:",e); }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const root = el("root");
  root.innerHTML = "";

  // Admin login modal overlay
  if(state.showAdminLogin){
    root.appendChild(renderAdminLoginModal());
  }

  // Main screen
  let screen;
  if(state.screen==="landing")       screen = renderLanding();
  else if(state.screen==="signin")   screen = renderSignIn();
  else if(state.screen==="instructions") screen = renderInstructions();
  else if(state.screen==="exam")     screen = renderExam();
  else if(state.screen==="result")   screen = renderResult();
  else if(state.screen==="admin")    screen = renderAdmin();
  else screen = renderLanding();

  root.appendChild(screen);
}

function handleLogoClick(){
  state.logoClickCount++;
  clearTimeout(state.logoClickTimer);
  if(state.logoClickCount>=3){
    state.logoClickCount=0;
    state.showAdminLogin=true;
    render();
    return;
  }
  state.logoClickTimer = setTimeout(()=>{ state.logoClickCount=0; },1500);
}

// ── INSTRUCTIONS ──────────────────────────────────────────────────────────────
function renderInstructions(){
  const div = document.createElement("div");
  div.style.cssText = "min-height:100vh;background:#0a0f1e;display:flex;flex-direction:column;";
  div.innerHTML = `
    <div style="background:#0f172a;border-bottom:1px solid #1e293b;padding:16px 24px;display:flex;align-items:center;gap:12px;">
      <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:16px;">📋</div>
      <div>
        <div style="color:#f1f5f9;font-weight:800;font-size:15px;">ExamReady</div>
        <div style="color:#475569;font-size:12px;">Welcome, ${state.student.name}</div>
      </div>
    </div>
    <div style="flex:1;max-width:720px;margin:0 auto;width:100%;padding:36px 24px;overflow-y:auto;">
      <div style="margin-bottom:28px;">
        <h2 style="color:#f1f5f9;font-size:24px;font-weight:800;margin-bottom:6px;">Exam Instructions</h2>
        <p style="color:#475569;font-size:14px;">Please read all instructions carefully before starting the exam.</p>
      </div>
      <div id="instrList" style="display:flex;flex-direction:column;"></div>
      <div id="instrLoader" style="display:flex;align-items:center;gap:8px;margin-top:20px;color:#3b82f6;">
        <div style="width:6px;height:6px;border-radius:50%;background:#3b82f6;animation:pulse 1s infinite;"></div>
        <span style="font-size:13px;">Loading instructions...</span>
      </div>
      <div id="instrDone" style="display:none;margin-top:36px;padding:24px;background:rgba(34,197,94,0.07);border:1px solid rgba(34,197,94,0.25);border-radius:14px;text-align:center;" class="fade">
        <div style="font-size:28px;margin-bottom:10px;">✅</div>
        <p style="color:#86efac;font-weight:700;font-size:16px;margin-bottom:6px;">You have read all ${INSTRUCTIONS.length} instructions.</p>
        <p style="color:#64748b;font-size:13px;margin-bottom:20px;">By clicking below, you confirm that you have understood all the rules.</p>
        <button id="startExamBtn" style="${BTN_CSS('linear-gradient(135deg,#16a34a,#15803d)')}padding:14px 40px;font-size:16px;box-shadow:0 8px 30px rgba(34,197,94,0.25);">I Understand — Start Exam →</button>
      </div>
      <div id="instrBottom"></div>
    </div>
  `;

  state.instructionRevealed = 0;
  clearInterval(state.instructionTimer);

  function revealNext(){
    if(state.instructionRevealed >= INSTRUCTIONS.length){
      clearInterval(state.instructionTimer);
      const loader = div.querySelector("#instrLoader");
      const done   = div.querySelector("#instrDone");
      if(loader) loader.style.display="none";
      if(done)   done.style.display="block";
      return;
    }
    const i    = state.instructionRevealed;
    const list = div.querySelector("#instrList");
    if(!list) return;
    const row = document.createElement("div");
    row.style.cssText = "display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid #0f172a;animation:fadeSlide 0.5s ease;";
    row.innerHTML = `
      <div style="width:28px;height:28px;border-radius:50%;flex-shrink:0;background:${i===0?"linear-gradient(135deg,#3b82f6,#8b5cf6)":i<2?"rgba(59,130,246,0.2)":"rgba(255,255,255,0.06)"};border:1px solid ${i<2?"rgba(59,130,246,0.4)":"#1e293b"};display:flex;align-items:center;justify-content:center;color:${i<2?"#60a5fa":"#475569"};font-size:12px;font-weight:800;">${i+1}</div>
      <p style="color:${i===0?"#f1f5f9":"#cbd5e1"};font-size:${i===0?"16px":"15px"};font-weight:${i===0?"700":"400"};line-height:1.65;margin:0;">${INSTRUCTIONS[i]}</p>
    `;
    list.appendChild(row);
    div.querySelector("#instrBottom").scrollIntoView({behavior:"smooth"});
    state.instructionRevealed++;
  }

  setTimeout(()=>{
    state.instructionTimer = setInterval(revealNext, 900);
  }, 300);

  div.querySelector("#instrDone") && (div.querySelector("#instrDone").onclick = null);
  div.addEventListener("click", e=>{
    if(e.target.id==="startExamBtn") startExam();
  });
  return div;
}

function startExam(){
  clearInterval(state.instructionTimer);
  state.answers   = {};
  state.statuses  = {};
  state.questions.forEach(q=>state.statuses[q.id]="unattempted");
  state.timeLeft  = 7200;
  state.startTime = Date.now();
  state.currentIdx = 0;
  state.showConfirm = false;
  goTo("exam");
  startTimer();
}

function startTimer(){
  clearInterval(state.timerInterval);
  state.timerInterval = setInterval(()=>{
    state.timeLeft--;
    const timerEl = el("examTimer");
    if(timerEl){
      timerEl.textContent = "⏱ "+formatTime(state.timeLeft);
      const tc = state.timeLeft<300?"#ef4444":state.timeLeft<600?"#f59e0b":"#22c55e";
      timerEl.style.color = tc;
      timerEl.parentElement.style.borderColor = tc+"55";
      timerEl.parentElement.style.background  = tc+"18";
    }
    // Update attempted counter
    const counts = getCounts();
    ["attempted","unattempted","review"].forEach(k=>{
      const cel = el("count_"+k);
      if(cel) cel.textContent = counts[k];
    });
    if(state.timeLeft<=0){ clearInterval(state.timerInterval); submitExam(); }
  },1000);
}

function getCounts(){
  const vals = Object.values(state.statuses);
  return {
    attempted:   vals.filter(s=>s==="attempted").length,
    unattempted: vals.filter(s=>s==="unattempted").length,
    review:      vals.filter(s=>s==="review").length,
  };
}

      <div style="color:#f1f5f9;font-weight:800;font-size:14px;">📋 ExamReady <span style="color:#64748b;font-size:12px;font-weight:400;">| ${state.student.name} · ${state.student.course}</span></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <div style="background:rgba(255,255,255,0.05);border:1px solid #22c55e44;border-radius:7px;padding:3px 10px;display:flex;align-items:center;gap:5px;">
          <span style="color:#64748b;font-size:11px;">Attempted:</span>

  div.querySelector("#nextBtn").onclick    = ()=>{ if(state.currentIdx<state.questions.length-1){state.currentIdx++;render();startTimer();} };
  div.querySelector("#reviewBtn").onclick  = ()=>{ state.statuses[state.questions[state.currentIdx].id]="review"; if(state.currentIdx<state.questions.length-1){state.currentIdx++;} render(); startTimer(); };
  div.querySelector("#submitBtn").onclick  = ()=>{ state.showConfirm=true; render(); startTimer(); };
  div.querySelector("#cancelSubmit").onclick  = ()=>{ state.showConfirm=false; render(); startTimer(); };
  div.querySelector("#confirmSubmit").onclick = ()=>submitExam();

  // Option clicks
  div.querySelectorAll(".optBtn").forEach(btn=>{
    btn.onclick = ()=>{
      const i = parseInt(btn.dataset.idx);
      const qid = state.questions[state.currentIdx].id;
      state.answers[qid]  = i;
      state.statuses[qid] = "attempted";
      // Re-render options only
      const area = div.querySelector("#optionsArea");
      area.innerHTML = state.questions[state.currentIdx].options.map((opt,oi)=>renderOption(opt,oi,state.questions[state.currentIdx])).join("");
      area.querySelectorAll(".optBtn").forEach(b=>{ b.onclick = arguments.callee; });
      // Re-wire (simple re-render is better)
      render(); startTimer();
    };
  });

  // Palette clicks
  div.querySelectorAll(".palBtn").forEach(btn=>{
    btn.onclick = ()=>{ state.currentIdx=parseInt(btn.dataset.gidx); render(); startTimer(); };
  });

  return div;
}

function statusColor(){
  const s = state.statuses[state.questions[state.currentIdx]?.id]||"unattempted";
  return s==="attempted"?"#22c55e":s==="review"?"#a855f7":"#ef4444";
}
function statusLabel(){
  const s = state.statuses[state.questions[state.currentIdx]?.id]||"unattempted";
  return s==="attempted"?"Attempted":s==="review"?"Marked for Review":"Not Attempted";
}
function renderOption(opt,i,q){
  const sel = state.answers[q.id]===i;
  return `<button class="optBtn" data-idx="${i}" style="background:${sel?"rgba(59,130,246,0.15)":"rgba(255,255,255,0.03)"};border:2px solid ${sel?"#3b82f6":"#334155"};border-radius:11px;padding:13px 16px;cursor:pointer;color:${sel?"#93c5fd":"#cbd5e1"};font-size:15px;text-align:left;font-family:inherit;display:flex;align-items:center;gap:11px;width:100%;">
    <span style="width:28px;height:28px;border-radius:50%;flex-shrink:0;background:${sel?"#3b82f6":"#1e293b"};border:2px solid ${sel?"#3b82f6":"#475569"};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:${sel?"#fff":"#94a3b8"};">${String.fromCharCode(65+i)}</span>
    ${opt}
  </button>`;
}
function renderPaletteBtn(pq,i,ac){
  const gi  = state.questions.findIndex(x=>x.id===pq.id);
  const st  = state.statuses[pq.id];
  const isA = gi===state.currentIdx;
  const bg  = isA?ac:st==="attempted"?"#16a34a":st==="review"?"#7c3aed":"#374151";
  return `<button class="palBtn" data-gidx="${gi}" style="width:30px;height:30px;border-radius:7px;border:none;background:${bg};color:#fff;font-size:11px;font-weight:700;cursor:pointer;box-shadow:${isA?`0 0 0 2px ${ac}88`:"none"};">${i+1}</button>`;
}

async function submitExam(){
  clearInterval(state.timerInterval);
  state.showConfirm = false;
  state.timeTaken   = Math.floor((Date.now()-state.startTime)/1000);

  let correct=0,incorrect=0,unattempted=0;
  state.questions.forEach(q=>{
    const s=state.statuses[q.id];
    if(s==="unattempted") unattempted++;
    else if(state.answers[q.id]===q.correct) correct++;
    else incorrect++;
  });
  state.correct     = correct;
  state.incorrect   = incorrect;
  state.unattempted = unattempted;
  state.score       = correct - incorrect*0.25;

  // Save to Firestore
  await saveResult({
    name:        state.student.name,
    email:       state.student.email,
    course:      state.student.course,
    score:       state.score,
    correct,incorrect,unattempted,
    timeTaken:   state.timeTaken,
    totalQs:     state.questions.length,
    accuracy:    correct+incorrect>0?((correct/(correct+incorrect))*100).toFixed(1):0,
  });

  goTo("result");
}

function renderResult(){
  const {correct,incorrect,unattempted,score,timeTaken,questions,student} = state;
  const accuracy = correct+incorrect>0?((correct/(correct+incorrect))*100).toFixed(1):0;

  function pStats(qs){
    let c=0,w=0,u=0;
    qs.forEach(q=>{
      if(state.statuses[q.id]==="unattempted") u++;
      else if(state.answers[q.id]===q.correct) c++;
      else w++;
    });
    return {c,w,u,score:(c-w*0.25).toFixed(2)};

  const p1=pStats(state.questions.filter(q=>q.part===1));

        ${[["✅","Correct",correct,"#22c55e"],["❌","Incorrect",incorrect,"#ef4444"],["⬜","Unattempted",unattempted,"#94a3b8"],["🎯","Accuracy",accuracy+"%","#3b82f6"],["⏱","Time Taken",formatTime(timeTaken),"#f59e0b"],["📋","Total Questions",state.questions.length,"#8b5cf6"]].map(([ic,lb,val,col])=>`

                <div style="flex:1;">
                  <div style="display:flex;gap:6px;margin-bottom:6px;">
                    <span style="background:${q.part===1?"rgba(59,130,246,0.2)":"rgba(168,85,247,0.2)"};color:${q.part===1?"#60a5fa":"#c084fc"};border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;">Part ${q.part}</span>
                    <span style="color:#475569;font-size:12px;">Q${i+1}</span>
                  </div>
                  <p style="color:#e2e8f0;font-size:14px;margin:0 0 8px;line-height:1.5;">${q.question}</p>
                  <div style="display:flex;flex-wrap:wrap;gap:6px;">
                    ${q.options.map((opt,idx)=>`<span style="background:${idx===q.correct?"rgba(34,197,94,0.15)":"rgba(255,255,255,0.05)"};border:1px solid ${idx===q.correct?"#22c55e":"#334155"};color:${idx===q.correct?"#86efac":"#94a3b8"};border-radius:6px;padding:3px 10px;font-size:12px;">${String.fromCharCode(65+idx)}. ${opt}${idx===q.correct?" ✓":""}</span>`).join("")}
                  </div>
                </div>
                <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;">
                  <button class="editQBtn" data-id="${q.id}" style="${BTN_CSS('#1d4ed8')}padding:6px 12px;font-size:12px;">✏ Edit</button>
                  <button class="delQBtn" data-id="${q.id}" style="${BTN_CSS('#dc2626')}padding:6px 12px;font-size:12px;">🗑 Delete</button>
                </div>
              </div>
            </div>`).join("")}
        </div>`}
      </div>

      <!-- BULK -->
      <div id="tabBulk" style="display:${state.adminTab==="bulk"?"block":"none"};">
        <div style="background:rgba(255,255,255,0.04);border:1px solid #334155;border-radius:16px;padding:24px;">
          <h3 style="color:#e2e8f0;font-size:16px;margin-bottom:8px;">📄 Add Multiple Questions at Once</h3>
          <div style="background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.25);border-radius:10px;padding:14px;margin-bottom:16px;font-size:12px;color:#93c5fd;line-height:2;">
            <b>Format — separate each question with one blank line:</b><br/>
            Q. Question text here<br/>A. First option<br/>B. Second option<br/>C. Third option<br/>D. Fourth option<br/>ANS: A<br/>PART: 1
          </div>
          <textarea id="bulkArea" rows="12" placeholder="Paste questions here..." style="${INP_CSS}resize:vertical;line-height:1.6;font-size:13px;margin-bottom:12px;">${state.adminBulk}</textarea>
          <p id="bulkMsg" style="color:#22c55e;font-size:13px;margin-bottom:12px;display:${state.adminBulkMsg?"block":"none"};">${state.adminBulkMsg}</p>
          <button id="bulkAddBtn" style="${BTN_CSS('linear-gradient(135deg,#16a34a,#15803d)')}padding:10px 24px;">➕ Parse &amp; Add All Questions</button>
        </div>
      </div>

      <!-- RESULTS -->
      <div id="tabResults" style="display:${state.adminTab==="results"?"block":"none"};">
        <div id="resultsContent" style="text-align:center;padding:40px;color:#475569;">
          <div class="spinner" style="margin:0 auto 16px;"></div>
          <p>Loading results...</p>
        </div>
      </div>
    </div>
  `;

  // Tab switching
  div.querySelectorAll(".adminTab").forEach(b=>b.onclick=()=>{ state.adminTab=b.dataset.tab; render(); if(b.dataset.tab==="results") loadResults(div); });

  // Part selector
  div.querySelectorAll(".partBtn").forEach(b=>b.onclick=()=>{ state.adminForm.part=parseInt(b.dataset.p); render(); });

  // Correct answer
  div.querySelectorAll(".correctBtn").forEach(b=>b.onclick=()=>{ state.adminForm.correct=parseInt(b.dataset.idx); render(); });

  // Option inputs
  div.querySelectorAll(".optInput").forEach(inp=>inp.oninput=e=>{ state.adminForm.options[parseInt(inp.dataset.idx)]=e.target.value; });

  // Question input
  const formQ = div.querySelector("#formQ");
  if(formQ) formQ.oninput=e=>state.adminForm.question=e.target.value;

  // Save question
  const saveBtn = div.querySelector("#saveQBtn");
  if(saveBtn) saveBtn.onclick = async()=>{
    state.adminForm.question = div.querySelector("#formQ")?.value||"";
    div.querySelectorAll(".optInput").forEach(i=>{ state.adminForm.options[parseInt(i.dataset.idx)]=i.value; });
    if(!state.adminForm.question.trim()){state.adminErr="Question field is empty.";render();return;}
    for(let i=0;i<4;i++) if(!state.adminForm.options[i].trim()){state.adminErr=`Option ${String.fromCharCode(65+i)} is empty.`;render();return;}
    state.adminErr="";
    saveBtn.textContent="Saving..."; saveBtn.disabled=true;
    if(state.adminEditId){
      await updateQuestion(state.adminEditId,{...state.adminForm});
      state.adminEditId=null;
    } else {
      await saveQuestion({...state.adminForm});
    }
    state.adminForm={question:"",options:["","","",""],correct:0,part:1};
    state.adminTab="list"; render();
  };

  const cancelBtn = div.querySelector("#cancelEditBtn");
  if(cancelBtn) cancelBtn.onclick=()=>{ state.adminEditId=null; state.adminForm={question:"",options:["","","",""],correct:0,part:1}; render(); };

  // Filter
  div.querySelectorAll(".filterBtn").forEach(b=>b.onclick=()=>{ state.adminFilter=parseInt(b.dataset.fp); render(); });

  // Edit
  div.querySelectorAll(".editQBtn").forEach(b=>b.onclick=()=>{
    const q=state.questions.find(x=>x.id===b.dataset.id);
    if(q){ state.adminEditId=q.id; state.adminForm={question:q.question,options:[...q.options],correct:q.correct,part:q.part}; state.adminTab="add"; render(); }
  });

  // Delete
  div.querySelectorAll(".delQBtn").forEach(b=>b.onclick=async()=>{
    b.textContent="..."; b.disabled=true;
    await deleteQuestion(b.dataset.id);
    render();
  });

  // Bulk
  const bulkArea = div.querySelector("#bulkArea");
  if(bulkArea) bulkArea.oninput=e=>state.adminBulk=e.target.value;
  const bulkBtn = div.querySelector("#bulkAddBtn");
  if(bulkBtn) bulkBtn.onclick=async()=>{
    const text = div.querySelector("#bulkArea").value;
    const blocks=text.trim().split(/\n\s*\n/);
    let added=0,failed=0;
    bulkBtn.textContent="Adding..."; bulkBtn.disabled=true;
    for(const block of blocks){
      const lines=block.trim().split("\n").map(l=>l.trim()).filter(Boolean);
      try{
        const qL=lines.find(l=>/^Q[.:]/i.test(l));
        const aL=lines.find(l=>/^A[.:]/i.test(l));
        const bL=lines.find(l=>/^B[.:]/i.test(l));
        const cL=lines.find(l=>/^C[.:]/i.test(l));
        const dL=lines.find(l=>/^D[.:]/i.test(l));
        const ansL=lines.find(l=>/^ANS/i.test(l));
        const partL=lines.find(l=>/^PART/i.test(l));
        if(!qL||!aL||!bL||!cL||!dL||!ansL){failed++;continue;}
        const qText=qL.replace(/^Q[.:]\s*/i,"");
        const opts=[aL,bL,cL,dL].map(l=>l.replace(/^[A-D][.:]\s*/i,""));
        const ac=ansL.replace(/^ANS[.:]\s*/i,"").trim().toUpperCase();
        const correct=["A","B","C","D"].indexOf(ac);
        const part=partL?parseInt(partL.replace(/^PART[.:]\s*/i,"")):1;
        if(correct===-1){failed++;continue;}
        await saveQuestion({question:qText,options:opts,correct,part:part===2?2:1});
        added++;
      }catch{failed++;}
    }
    state.adminBulkMsg=`${added} question(s) added.${failed>0?` ${failed} skipped.`:""}`;
    state.adminBulk=""; state.adminTab="list"; render();
  };

  // Exit
  div.querySelector("#adminExitBtn").onclick=()=>goTo("landing");

  // Load results if on results tab
  if(state.adminTab==="results") setTimeout(()=>loadResults(div),100);

  return div;
}

async function loadResults(parentDiv){
  try{
    const snap=await getDocs(query(collection(db,"results"),orderBy("submittedAt","desc")));
    const results=snap.docs.map(d=>({id:d.id,...d.data()}));
    const content=parentDiv.querySelector("#resultsContent");
    if(!content) return;
    if(results.length===0){
      content.innerHTML=`<div style="font-size:32px;margin-bottom:8px;">📭</div><p>No results yet.</p>`;
      return;
    }
    content.innerHTML=`
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead>
            <tr style="background:#1e293b;">
              ${["#","Name","Email","Course","Score","Correct","Wrong","Skip","Accuracy","Time"].map(h=>`<th style="padding:10px 12px;text-align:left;color:#94a3b8;font-weight:600;border-bottom:1px solid #334155;">${h}</th>`).join("")}
            </tr>
          </thead>
          <tbody>
            ${results.map((r,i)=>`
              <tr style="border-bottom:1px solid #1e293b;">
                <td style="padding:10px 12px;color:#64748b;">${i+1}</td>
                <td style="padding:10px 12px;color:#f1f5f9;font-weight:600;">${r.name}</td>
                <td style="padding:10px 12px;color:#94a3b8;">${r.email}</td>
                <td style="padding:10px 12px;color:#94a3b8;">${r.course}</td>
                <td style="padding:10px 12px;color:#3b82f6;font-weight:700;">${parseFloat(r.score).toFixed(2)}</td>
                <td style="padding:10px 12px;color:#22c55e;">${r.correct}</td>
                <td style="padding:10px 12px;color:#ef4444;">${r.incorrect}</td>
                <td style="padding:10px 12px;color:#64748b;">${r.unattempted}</td>
                <td style="padding:10px 12px;color:#f59e0b;">${r.accuracy}%</td>
                <td style="padding:10px 12px;color:#94a3b8;">${formatTime(r.timeTaken)}</td>
              </tr>`).join("")}
          </tbody>
        </table>
      </div>`;
  }catch(e){
    const content=parentDiv?.querySelector("#resultsContent");
    if(content) content.innerHTML=`<p style="color:#f87171;">Error loading results. Check Firestore rules.</p>`;
  }
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
async function goTo(screen){
  clearInterval(state.timerInterval);
  clearInterval(state.instructionTimer);
  if(screen==="admin"){
    state.loading=true; render();
    await loadQuestions();
    state.loading=false;
    state.adminTab="add"; state.adminFilter=0;
    state.adminEditId=null;
    state.adminForm={question:"",options:["","","",""],correct:0,part:1};
    state.adminBulk=""; state.adminBulkMsg=""; state.adminErr="";
  }
  if(screen==="signin"){
    state.loading=true; render();
    await loadQuestions();
    state.loading=false;
  }
  state.screen=screen;
  render();
}

// ── CSS HELPERS ───────────────────────────────────────────────────────────────
const INP_CSS = "width:100%;padding:10px 13px;border-radius:9px;box-sizing:border-box;background:rgba(255,255,255,0.06);border:1px solid #334155;color:#f1f5f9;font-size:14px;outline:none;font-family:inherit;";
function BTN_CSS(bg){ return `padding:9px 18px;border-radius:9px;border:none;cursor:pointer;background:${bg};color:#fff;font-size:13px;font-weight:700;font-family:inherit;`; }

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
